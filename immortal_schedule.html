function localDateString(date){const y=date.getFullYear();const m=String(date.getMonth()+1).padStart(2,'0');const d=String(date.getDate()).padStart(2,'0');return `${y}-${m}-${d}`}
function initialPosition(){const today=localDateString(new Date());for(let w=0;w<weeks.length;w++){const d=weeks[w].days.findIndex(day=>day.fullDate===today);if(d!==-1)return{week:w,day:d}}const js=new Date().getDay();return{week:0,day:js===0?6:js-1}}
const start=initialPosition();let currentWeekIndex=start.week;let currentDayIndex=start.day;
function currentWeek(){return weeks[currentWeekIndex]}
function itemHTML(item){if(!item)return '<span class="empty">일정 없음</span>';return `<span class="icon ${item.type}">${item.icon}</span><span class="item-title ${item.type}">${item.title}</span><span class="item-sub">${item.sub}</span>`}
function renderHeader(){const week=currentWeek();document.getElementById('weekTitle').textContent=week.title;document.getElementById('weekRange').textContent=week.range}
function renderDots(){const box=document.getElementById('weekDots');box.innerHTML=weeks.map((w,i)=>`<button type="button" class="week-dot ${i===currentWeekIndex?'active':''}" data-index="${i}" aria-label="${w.title}"></button>`).join('');box.querySelectorAll('.week-dot').forEach(btn=>btn.addEventListener('click',()=>{currentWeekIndex=Number(btn.dataset.index);currentDayIndex=0;renderAll()}))}
function renderDesktop(){const week=currentWeek(),today=localDateString(new Date()),grid=document.getElementById('desktopGrid');let html='<div class="cell head">시간</div>';week.days.forEach((day,i)=>{const dayClass=i===5?'sat':i===6?'sun':'';const todayClass=day.fullDate===today?'today-column':'';html+=`<div class="cell head ${dayClass} ${todayClass}"><div>${day.name}</div><div class="date">${day.date}</div></div>`});times.forEach(time=>{html+=`<div class="cell time">${time}</div>`;week.days.forEach(day=>{const todayClass=day.fullDate===today?'today-column':'';html+=`<div class="cell ${todayClass}">${itemHTML(day.items[time])}</div>`})});grid.innerHTML=html}
function renderMobile(){const day=currentWeek().days[currentDayIndex];document.getElementById('mobileDayName').textContent=day.name;document.getElementById('mobileDayDate').textContent=day.date;document.getElementById('mobileCardList').innerHTML=times.map(time=>{const item=day.items[time];return `<article class="mobile-card"><div class="mobile-time">${time.replace(' ~ ','<br>~ ')}</div><div class="mobile-detail">${item?`<span class="icon ${item.type}">${item.icon}</span><div><div class="item-title ${item.type}">${item.title}</div><div class="item-sub">${item.sub}</div></div>`:'<div class="mobile-empty">예정된 일정이 없습니다.</div>'}</div></article>`}).join('')}
function renderNotices(){const html=currentWeek().notices.map(n=>`<li>${n}</li>`).join('');document.getElementById('desktopNoticeList').innerHTML=html;document.getElementById('mobileNoticeList').innerHTML=html}
function changeWeek(amount){currentWeekIndex=(currentWeekIndex+amount+weeks.length)%weeks.length;currentDayIndex=0;renderAll()}
function changeDay(amount){const next=currentDayIndex+amount;if(next<0){currentWeekIndex=(currentWeekIndex-1+weeks.length)%weeks.length;currentDayIndex=currentWeek().days.length-1}else if(next>=currentWeek().days.length){currentWeekIndex=(currentWeekIndex+1)%weeks.length;currentDayIndex=0}else currentDayIndex=next;renderAll()}
function renderAll(){renderHeader();renderDots();renderDesktop();renderMobile();renderNotices()}
document.getElementById('prevWeek').addEventListener('click',()=>changeWeek(-1));document.getElementById('nextWeek').addEventListener('click',()=>changeWeek(1));document.getElementById('prevDay').addEventListener('click',()=>changeDay(-1));document.getElementById('nextDay').addEventListener('click',()=>changeDay(1));
let touchStartX=0,touchStartY=0;document.getElementById('mobileSchedule').addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].clientX;touchStartY=e.changedTouches[0].clientY},{passive:true});document.getElementById('mobileSchedule').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-touchStartX,dy=e.changedTouches[0].clientY-touchStartY;if(Math.abs(dx)<55||Math.abs(dx)<Math.abs(dy))return;changeDay(dx<0?1:-1)},{passive:true});
renderAll();
</script>
</body>
</html>
